<p-toast position="top-right" />

<div class="auth-wrapper">
  <div class="auth-card">

    <div class="card-header">
      <i class="pi pi-shield logo-icon"></i>
    </div>

    <p-tabs [value]="activeTab" styleClass="auth-tabs">
      <p-tablist>
        <p-tab value="0">
          <i class="pi pi-sign-in" style="margin-right:6px"></i> Iniciar Sesión
        </p-tab>
        <p-tab value="1">
          <i class="pi pi-user-plus" style="margin-right:6px"></i> Registrarse
        </p-tab>
      </p-tablist>
      <p-tabpanels>
        <p-tabpanel value="0">
          <app-login (goToRegister)="goToRegister()" />
        </p-tabpanel>
        <p-tabpanel value="1">
          <app-register (goToLogin)="goToLogin()" />
        </p-tabpanel>
      </p-tabpanels>
    </p-tabs>

  </div>
</div>
