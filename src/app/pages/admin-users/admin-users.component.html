<p-toast position="top-right" />

<div class="admin-users-page">

  <!-- Header -->
  <div class="page-header">
    <div class="header-left">
      <h1 class="page-title"><i class="pi pi-users"></i> Gestión de Usuarios</h1>
      <p class="page-subtitle">Administra los permisos de cada usuario del sistema</p>
    </div>
  </div>

  <!-- Tabla -->
  <div class="card">
    <p-table [value]="users" [rowHover]="true" responsiveLayout="scroll">

      <ng-template pTemplate="header">
        <tr>
          <th>Usuario</th>
          <th>Área</th>
          <th style="text-align:center">Permisos asignados</th>
          <th style="text-align:center">Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-user>
        <tr>
          <td>
            <div class="user-cell">
              <div class="avatar-mini">{{ user.username[0].toUpperCase() }}</div>
              <span class="username-text">{{ user.username }}</span>
            </div>
          </td>
          <td>
            <p-tag [value]="user.area" severity="secondary" />
          </td>
          <td style="text-align:center">
            <p-tag [value]="permissionCount(user) + ' permisos'"
                   [severity]="permissionCount(user) > 3 ? 'success' : 'warn'" />
          </td>
          <td style="text-align:center">
            <div class="action-btns">
              <p-button icon="pi pi-pencil" label="Editar permisos" size="small"
                        (onClick)="openDialog(user)" />
              <p-button icon="pi pi-refresh" label="Restablecer" size="small"
                        severity="secondary" (onClick)="resetToDefault(user)" />
            </div>
          </td>
        </tr>
      </ng-template>

    </p-table>
  </div>

</div>

<!-- Dialog de edición de permisos -->
<p-dialog
  [(visible)]="dialogVisible"
  [modal]="true"
  [closable]="true"
  (onHide)="closeDialog()"
  [style]="{ width: '520px' }"
  [header]="'Permisos de ' + (selectedUser?.username ?? '')">

  <div class="dialog-body" *ngIf="selectedUser">

    <div *ngFor="let group of permissionGroups" class="perm-group">
      <p-divider align="left">
        <span class="group-label"><i class="pi pi-shield"></i> {{ group.label }}</span>
      </p-divider>

      <div class="perm-grid">
        <div class="perm-item" *ngFor="let p of group.keys">
          <p-checkbox
            [binary]="true"
            [ngModel]="isChecked(p.value)"
            (onChange)="togglePermission(p.value)"
            [inputId]="p.value" />
          <label [for]="p.value" class="perm-label">{{ p.key }}</label>
          <code class="perm-code">{{ p.value }}</code>
        </div>
      </div>
    </div>

  </div>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" icon="pi pi-times" severity="secondary"
              (onClick)="closeDialog()" />
    <p-button label="Guardar cambios" icon="pi pi-check"
              (onClick)="savePermissions()" />
  </ng-template>

</p-dialog>
