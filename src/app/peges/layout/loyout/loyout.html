<app-sidebar [visible]="sidebarVisible()" (closeSidebar)="closeSidebar()" />
<p-confirmDialog [style]="{ width: '380px' }" />

<div class="layout-wrapper">
    <header class="topbar">
        <div class="topbar-left">
            <p-button icon="pi pi-bars" [text]="true" [rounded]="true" severity="secondary"
                styleClass="topbar-hamburger" (click)="toggleSidebar()" />
            <div class="topbar-brand">
                <div class="topbar-brand-icon"><i class="pi pi-shield"></i></div>
                <span class="topbar-title">Seguridad</span>
            </div>
            <div class="topbar-sep"></div>
            <span class="topbar-page">Sistema de Gestión</span>
        </div>

        <div class="topbar-right">
            <div class="topbar-user">
                <div class="user-avatar">{{ userInitial }}</div>
                <span class="user-name">{{ userName }}</span>
            </div>
            <p-button icon="pi pi-sign-out" [text]="true" [rounded]="true" severity="danger"
                pTooltip="Cerrar sesión" tooltipPosition="left" (click)="confirmLogout()" />
        </div>
    </header>

    <main class="layout-content">
        <router-outlet />
    </main>
</div>
