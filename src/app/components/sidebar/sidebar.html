@if (visible()) {
<div class="sidebar-backdrop" (click)="onOverlayClick()"></div>
}

<aside class="sidebar" [class.sidebar-open]="visible()">
    <div class="sidebar-brand">
        <div class="brand-icon"><i class="pi pi-shield"></i></div>
        <span class="brand-text">Seguridad</span>
        <span class="brand-version">v1.0</span>
    </div>

    <nav class="sidebar-nav">
        <span class="nav-section-label">Menú</span>
        <ul class="nav-list">
            @for (item of menuItems; track item.label) {
            <li>
                <a class="nav-item" [routerLink]="item.route" routerLinkActive="nav-active"
                    [routerLinkActiveOptions]="{ exact: item.route === '/home' }"
                    pRipple (click)="onOverlayClick()">
                    <span class="nav-item-icon"><i [class]="item.icon"></i></span>
                    <span>{{ item.label }}</span>
                </a>
            </li>
            }
        </ul>
    </nav>

    <div class="sidebar-footer">
        <div class="sidebar-footer-content">
            <i class="pi pi-circle-fill" style="font-size:0.45rem;color:#22c55e"></i>
            <span>Sistema activo</span>
            <div class="online-dot"></div>
        </div>
    </div>
</aside>
